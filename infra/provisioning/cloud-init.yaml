#cloud-config
# PixelPort Tenant Provisioning — cloud-init Template
# This template documents the expected shape of the provisioning script.
# The actual runtime script is generated by buildCloudInit() in provision-tenant.ts.
#
# Variables (replaced at runtime by Inngest provisioning function):
#   {{TENANT_SLUG}}             — tenant identifier
#   (Droplet image/size/region baseline is selected before cloud-init using
#    PROVISIONING_DROPLET_IMAGE, PROVISIONING_DROPLET_SIZE, and
#    PROVISIONING_DROPLET_REGION. Legacy fallbacks:
#    PIXELPORT_DROPLET_IMAGE / DO_GOLDEN_IMAGE_ID, PIXELPORT_DROPLET_SIZE,
#    PIXELPORT_DROPLET_REGION. If none are set, provisioning uses the
#    compatibility image `ubuntu-24-04-x64`.)
#   {{OPENCLAW_BASE_IMAGE}}     — pinned OpenClaw base image (e.g., ghcr.io/openclaw/openclaw:2026.3.11)
#   {{OPENCLAW_RUNTIME_IMAGE}}  — runtime image (defaults to OPENCLAW_BASE_IMAGE unless an override is set)
#   {{GATEWAY_TOKEN}}           — random UUID for gateway auth
#   {{OPENAI_API_KEY}}          — OpenAI API key used directly by OpenClaw
#   {{GEMINI_API_KEY}}          — Gemini key (fallback model + web search provider)
#   {{AGENTMAIL_API_KEY}}       — AgentMail API key

runcmd:
  - |
    set -euo pipefail

    # 1. Install Docker CE if not already present
    if ! command -v docker &> /dev/null; then
      apt-get update -y
      apt-get install -y ca-certificates curl gnupg
      install -m 0755 -d /etc/apt/keyrings
      curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
      chmod a+r /etc/apt/keyrings/docker.gpg
      echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo "$VERSION_CODENAME") stable" > /etc/apt/sources.list.d/docker.list
      apt-get update -y
      apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin
      systemctl enable docker
      systemctl start docker
    fi

    # 2. Pull the OpenClaw runtime image
    mkdir -p /opt/openclaw
    mkdir -p /opt/openclaw/workspace-main
    mkdir -p /opt/openclaw/canvas
    mkdir -p /opt/openclaw/cron
    mkdir -p /opt/openclaw/agents
    docker pull {{OPENCLAW_RUNTIME_IMAGE}}

    # 3. Write openclaw.json candidates (generated from buildOpenClawConfig)
    # 4. Write the workspace contract:
    #    - root prompt files: SOUL.md, TOOLS.md, AGENTS.md, HEARTBEAT.md, BOOTSTRAP.md
    #    - pixelport/ namespace for durable runtime artifacts and snapshots
    # 5. Write .env (OPENAI_API_KEY, MEMORY_OPENAI_API_KEY, GEMINI_API_KEY, AGENTMAIL_API_KEY, PIXELPORT_API_KEY, SLACK_APP_TOKEN)

    # 6. Set ownership (OpenClaw container runs as node:1000)
    chown -R 1000:1000 /opt/openclaw
    chmod 600 /opt/openclaw/openclaw.json /opt/openclaw/.env

    # 7. Validate openclaw.json before startup with docker run --rm
    #    The runtime first validates the ACP-hardened config, then falls back to a
    #    no-ACP variant only if validation errors clearly point at ACP keys.

    # 8. Run the OpenClaw gateway container
    # --network host: required because OpenClaw binds to 127.0.0.1 in bridge mode
    # --env-file: secrets (OpenAI key, AgentMail key, Slack app token)
    # openclaw.mjs gateway: explicit entrypoint with port and bind flags
    docker rm -f openclaw-gateway >/dev/null 2>&1 || true
    docker run -d \
      --name openclaw-gateway \
      --restart unless-stopped \
      --network host \
      --env-file /opt/openclaw/.env \
      -v /opt/openclaw/openclaw.json:/home/node/.openclaw/openclaw.json \
      -v /opt/openclaw/workspace-main:/home/node/.openclaw/workspace-main \
      -v /opt/openclaw/canvas:/home/node/.openclaw/canvas \
      -v /opt/openclaw/cron:/home/node/.openclaw/cron \
      -v /opt/openclaw/agents:/home/node/.openclaw/agents \
      {{OPENCLAW_RUNTIME_IMAGE}} \
      openclaw.mjs gateway --port 18789 --bind lan --allow-unconfigured

    # 9. Normalize runtime state perms so memory/device features can write
    normalize_runtime_state_perms() {
      local attempts=0
      until docker exec -u 0 openclaw-gateway sh -lc '
        set -e
        mkdir -p /home/node/.openclaw /home/node/.openclaw/identity /home/node/.openclaw/devices
        chown 1000:1000 /home/node/.openclaw /home/node/.openclaw/identity /home/node/.openclaw/devices
        chmod 700 /home/node/.openclaw /home/node/.openclaw/identity /home/node/.openclaw/devices
      '; do
        attempts=$((attempts + 1))
        if [ "$attempts" -ge 5 ]; then
          echo "Failed to normalize OpenClaw runtime state permissions" >&2
          exit 1
        fi
        sleep 2
      done
    }

    normalize_runtime_state_perms

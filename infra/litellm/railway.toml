[build]
# Deploy from infra/litellm as root; Dockerfile is in this directory
dockerfilePath = "Dockerfile"

[deploy]
# /health returns 401 when master auth is enforced, so use root for health checks
healthcheckPath = "/"
healthcheckTimeout = 120
startCommand = "litellm --config /app/config.yaml --host 0.0.0.0 --port 4000"

# Railway PORT is set but this image reliably serves on explicit 4000
